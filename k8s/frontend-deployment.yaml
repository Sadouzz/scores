apiVersion: apps/v1
kind: Deployment
metadata:
  name: scores-frontend
  labels:
    app: scores-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scores-frontend
  template:
    metadata:
      labels:
        app: scores-frontend
    spec:
      containers:
      - name: scores-frontend
        image: sadouzz/scores-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: scores-frontend-service
spec:
  selector:
    app: scores-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort
